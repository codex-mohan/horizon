<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Vibrant Modern Gradients -->
    <linearGradient id="gradient-primary" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>   <!-- Indigo 600 -->
      <stop offset="50%" stop-color="#9333EA"/>  <!-- Purple 600 -->
      <stop offset="100%" stop-color="#DB2777"/> <!-- Pink 600 -->
    </linearGradient>
    <linearGradient id="gradient-secondary" x1="0" y1="256" x2="512" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>   <!-- Cyan 500 -->
      <stop offset="50%" stop-color="#3B82F6"/>  <!-- Blue 500 -->
      <stop offset="100%" stop-color="#8B5CF6"/> <!-- Violet 500 -->
    </linearGradient>
  </defs>
  
  <!-- Ambient Orbit Rings -->
  <circle cx="256" cy="256" r="230" stroke="url(#gradient-secondary)" stroke-width="16" opacity="0.2"/>
  <circle cx="256" cy="256" r="190" stroke="url(#gradient-primary)" stroke-width="8" opacity="0.1"/>
  
  <!-- Horizon Arch (Rising Sun / Dome) -->
  <path d="M 128 230 A 128 128 0 0 1 384 230" stroke="url(#gradient-primary)" stroke-width="40" stroke-linecap="round"/>
  
  <!-- Inner Core / Singularity -->
  <circle cx="256" cy="230" r="40" fill="url(#gradient-secondary)"/>
  <circle cx="256" cy="230" r="16" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Main Horizon Line -->
  <line x1="88" y1="300" x2="424" y2="300" stroke="url(#gradient-primary)" stroke-width="40" stroke-linecap="round"/>
  
  <!-- Lower Reflection Line -->
  <line x1="160" y1="380" x2="352" y2="380" stroke="url(#gradient-secondary)" stroke-width="40" stroke-linecap="round" opacity="0.85"/>
</svg>