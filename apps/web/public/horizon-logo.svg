<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Primary horizontal gradient: purple → indigo → cyan -->
    <linearGradient id="hg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Reverse gradient for orbital -->
    <linearGradient id="hgr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Core radial glow -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0f0ff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#c7d2fe" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Atmosphere glow under the arc -->
    <radialGradient id="atmo" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for main arc -->
    <filter id="gl" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <!-- Strong glow for core -->
    <filter id="cg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <!-- Subtle glow -->
    <filter id="sg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Atmospheric glow -->
  <ellipse cx="256" cy="240" rx="200" ry="160" fill="url(#atmo)"/>

  <!-- === MAIN UPWARD ARC — the hero element === -->
  <!-- The arc curves UPWARD like a sunrise/event horizon -->
  <g filter="url(#gl)">
    <!-- Primary thick arc — upward bow -->
    <path
      d="M 52,310 C 100,310 160,120 256,120 C 352,120 412,310 460,310"
      fill="none"
      stroke="url(#hg)"
      stroke-width="5.5"
      stroke-linecap="round"
    />

    <!-- Secondary arc — tighter, thinner -->
    <path
      d="M 88,300 C 130,300 175,148 256,148 C 337,148 382,300 424,300"
      fill="none"
      stroke="url(#hg)"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.45"
    />

    <!-- Tertiary arc — subtle whisper -->
    <path
      d="M 120,290 C 155,290 195,175 256,175 C 317,175 357,290 392,290"
      fill="none"
      stroke="url(#hg)"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.2"
    />
  </g>

  <!-- === Flat horizon baseline === -->
  <g filter="url(#sg)">
    <line
      x1="48" y1="315"
      x2="464" y2="315"
      stroke="url(#hg)"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.3"
    />
  </g>

  <!-- === Orbital ring (tilted ellipse crossing the arc) === -->
  <g filter="url(#sg)">
    <ellipse
      cx="256" cy="248"
      rx="155" ry="55"
      fill="none"
      stroke="url(#hgr)"
      stroke-width="2"
      transform="rotate(-20, 256, 248)"
      opacity="0.4"
    />
  </g>

  <!-- === Inner orbital ring === -->
  <g filter="url(#sg)">
    <ellipse
      cx="256" cy="240"
      rx="90" ry="32"
      fill="none"
      stroke="url(#hgr)"
      stroke-width="1.5"
      transform="rotate(14, 256, 240)"
      opacity="0.3"
    />
  </g>

  <!-- === Singularity core === -->
  <!-- Outer glow bloom -->
  <circle cx="256" cy="235" r="32" fill="url(#core)" filter="url(#cg)" opacity="0.5"/>

  <!-- Core disc -->
  <circle cx="256" cy="235" r="12" fill="url(#core)"/>

  <!-- Bright center point -->
  <circle cx="256" cy="235" r="4.5" fill="#eef2ff" opacity="0.95"/>

  <!-- === Light streaks from core (subtle downward rays) === -->
  <g opacity="0.15" stroke="url(#hg)" stroke-width="1" stroke-linecap="round">
    <line x1="256" y1="240" x2="190" y2="315"/>
    <line x1="256" y1="240" x2="322" y2="315"/>
    <line x1="256" y1="240" x2="148" y2="298"/>
    <line x1="256" y1="240" x2="364" y2="298"/>
  </g>

  <!-- === Orbital accent particles === -->
  <circle cx="100" cy="298" r="2.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="412" cy="298" r="2.5" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="165" cy="195" r="1.8" fill="#818cf8" opacity="0.4"/>
  <circle cx="347" cy="195" r="1.8" fill="#38bdf8" opacity="0.4"/>
  <circle cx="210" cy="145" r="1.2" fill="#c084fc" opacity="0.3"/>
  <circle cx="302" cy="145" r="1.2" fill="#22d3ee" opacity="0.3"/>
</svg>