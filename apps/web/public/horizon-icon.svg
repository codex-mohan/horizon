<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Primary gradient: magenta → indigo → cyan (left to right) -->
    <linearGradient id="horizonGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Vertical gradient for the arc glow: transparent top → colored bottom -->
    <linearGradient id="arcGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Radial glow for singularity point -->
    <radialGradient id="singularity" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#a5b4fc" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer orbital ring gradient -->
    <linearGradient id="orbitalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Accent gradient for inner ring -->
    <linearGradient id="innerRingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Soft outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow for singularity -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <!-- Subtle glow for lines -->
    <filter id="lineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === Background glow atmosphere === -->
  <ellipse cx="256" cy="280" rx="180" ry="120" fill="url(#arcGlow)" opacity="0.4"/>

  <!-- === Outer orbital ring (tilted ellipse) === -->
  <g filter="url(#glow)">
    <ellipse
      cx="256" cy="256"
      rx="185" ry="68"
      fill="none"
      stroke="url(#orbitalGrad)"
      stroke-width="3"
      transform="rotate(-15, 256, 256)"
      opacity="0.5"
    />
  </g>

  <!-- === Main horizon arc — the defining shape === -->
  <g filter="url(#lineGlow)">
    <!-- Thick horizon arc (bottom half of ellipse) -->
    <path
      d="M 56,290 Q 156,190 256,180 Q 356,190 456,290"
      fill="none"
      stroke="url(#horizonGrad)"
      stroke-width="6"
      stroke-linecap="round"
    />

    <!-- Secondary thinner arc above -->
    <path
      d="M 96,270 Q 176,200 256,192 Q 336,200 416,270"
      fill="none"
      stroke="url(#horizonGrad)"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.5"
    />

    <!-- Tertiary subtle arc -->
    <path
      d="M 130,255 Q 193,210 256,204 Q 319,210 382,255"
      fill="none"
      stroke="url(#horizonGrad)"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.3"
    />
  </g>

  <!-- === Inner orbital ring (tighter, opposite tilt) === -->
  <g filter="url(#lineGlow)">
    <ellipse
      cx="256" cy="250"
      rx="110" ry="42"
      fill="none"
      stroke="url(#innerRingGrad)"
      stroke-width="2.5"
      transform="rotate(12, 256, 250)"
      opacity="0.6"
    />
  </g>

  <!-- === Horizon line — sharp clean line across === -->
  <line
    x1="72" y1="295"
    x2="440" y2="295"
    stroke="url(#horizonGrad)"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- === Singularity core glow (behind the point) === -->
  <circle cx="256" cy="248" r="35" fill="url(#singularity)" filter="url(#coreGlow)" opacity="0.6"/>

  <!-- === Singularity core point === -->
  <circle cx="256" cy="248" r="14" fill="url(#singularity)"/>

  <!-- === Small bright center dot === -->
  <circle cx="256" cy="248" r="5" fill="#e0e7ff" opacity="0.95"/>

  <!-- === Light rays emanating from center (subtle) === -->
  <g opacity="0.2" stroke="url(#horizonGrad)" stroke-width="1" stroke-linecap="round">
    <line x1="256" y1="248" x2="200" y2="310"/>
    <line x1="256" y1="248" x2="312" y2="310"/>
    <line x1="256" y1="248" x2="165" y2="268"/>
    <line x1="256" y1="248" x2="347" y2="268"/>
  </g>

  <!-- === Accent dots (orbital particles) === -->
  <circle cx="115" cy="270" r="3" fill="#a855f7" opacity="0.7"/>
  <circle cx="397" cy="270" r="3" fill="#0ea5e9" opacity="0.7"/>
  <circle cx="178" cy="215" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="334" cy="215" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="148" cy="295" r="1.5" fill="#c084fc" opacity="0.4"/>
  <circle cx="364" cy="295" r="1.5" fill="#22d3ee" opacity="0.4"/>
</svg>